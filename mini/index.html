<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mini-project-profile-card</title>
</head>

<body>
    <div class="container">
        <header>
            <h1>our staff</h1>
            <nav>
                <a href="#profile1">joe</a>
                <a href="#profile2">matt</a>
                <a href="#profile3">jane</a>
            </nav>
        </header>

        <main>
            <article id="profile1" class="card"></article>
            <figure>
                <img src="/IMG_2508.JPG" alt="joe coder" width="500" height="500">
                <figcaption>joe coder</figcaption>
            </figure>
            <p><q>i code stuff.</q></p>
            <article id="profile2" class="card"></article>
            <figure>
                <img src="/IMG_2508.JPG" alt="matt designer" width="500" height="500">
                <figcaption>matt designer</figcaption>
            </figure>
            <p><q>i design stuff.</q></p>
            <article id="profile3" class="card"></article>
            <figure>
                <img src="/IMG_2508.JPG" alt="jane dev rel" width="500" height="500">
                <figcaption>jane dev rel </figcaption>
            </figure>
            <p><q>i teach stuff.</q></p>

            
        </main>

        <footer>
            <p>&copy; acme.co</p>
        </footer>
    </div>
</body>

</html>
